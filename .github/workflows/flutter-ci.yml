name: Flutter CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # ==================== Android APK 构建 ====================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner (optional)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release

      # 验证数据库 asset 是否被打包进 APK
      - name: Verify database asset in APK
        run: |
          unzip -l build/app/outputs/flutter-apk/app-release.apk | grep "assets/databases/translation.db" || exit 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ==================== Windows 桌面应用构建 ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner (optional)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows executable
        run: flutter build windows --release

      # 验证数据库 asset 是否存在于构建输出中（修复 PowerShell 7 兼容性）
      - name: Verify database asset in Windows build
        run: |
          $dbPath = "build\windows\x64\runner\Release\data\flutter_assets\assets\databases\translation.db"
          if (Test-Path $dbPath) {
            Write-Host "Database found at $dbPath"
            $bytes = [System.IO.File]::ReadAllBytes($dbPath)
            $header = $bytes[0..15]
            # SQLite 文件头固定为 "SQLite format 3\0"
            if ($header[0] -eq 0x53 -and $header[1] -eq 0x51 -and $header[2] -eq 0x4C) {
              Write-Host "Database file is valid SQLite."
            } else {
              Write-Error "Database file is corrupted!"
              exit 1
            }
          } else {
            Write-Error "Database asset missing in Windows build!"
            exit 1
          }

      - name: Archive Windows build
        run: Compress-Archive -Path build\windows\x64\runner\Release -DestinationPath windows-release.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release.zip
          retention-days: 7

  # ==================== 创建或更新 GitHub Release ====================
  create-or-update-release:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: artifacts/apk

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts/windows

      - name: Force update 'latest' tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "最新开发版 (自动构建)"
          body: |
            这是基于 `main` 分支最新代码自动构建的版本。
            每次推送至 main 分支都会更新此 Release。
          files: |
            artifacts/apk/app-release.apk
            artifacts/windows/windows-release.zip
          prerelease: true
          draft: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
